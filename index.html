<!doctype html>
<html class="no-js" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graficador de Funciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css" 
        rel="stylesheet" integrity="sha384-BmbxuPwQa2lc/FVzBcNJ7UAyJxM6wuqIj61tLrc4wSX0szH/Ev+nYRRuWlolflfl" crossorigin="anonymous">
    <link rel="stylesheet" href="./style/index.css">
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Graficación</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDropdown">
          <ul class="navbar-nav">
            <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Abrir</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Visualizar</a></li>
            <li class="nav-item"><a class="nav-link" href="#">Expand</a></li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container mt-4"> <div class="card text-center shadow">
        <div class="card-header bg-dark text-white">
          Canvas de visualización
        </div>
        <div class="chart card-img-top pt-3">
          <canvas id="circlechart" width="640" height="480" style="border: 1px solid #ccc; border-radius: 5px;"></canvas>
        </div>
        
        <div class="card-body">
          <h5 class="card-title">Controles de Graficación</h5>
          <p class="card-text">Ingresa una función matemática y ajusta la vista.</p>
          
          <div class="input-group mb-3 justify-content-center">
            <span class="input-group-text">f(x) =</span>
            <input type="text" id="functionInput" class="form-control" value="sin(x)" style="max-width: 250px;" placeholder="Ej: sin(x), cos(x), x*x">
            <button class="btn btn-primary" type="button" id="btnPlot">Graficar</button>
            <button class="btn btn-secondary" type="button" id="btnZoomIn">Zoom (+)</button>
            <button class="btn btn-secondary" type="button" id="btnZoomOut">Zoom (-)</button>
          </div>
          
        </div>
        
        <div class="card-footer text-muted">
          Listo para graficar
        </div>
      </div>
    </div>

    <footer id="footer" class="pb-4 pt-4 mt-5 bg-light">
      </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/js/bootstrap.bundle.min.js" 
        integrity="sha384-b5kHyXgcpbZJO/tY9Ul7kGkf1S0CWuKcCD38l8YkeH8z8QjE0GmW1gYU5S9FOnJ0" crossorigin="anonymous">
    </script>
    <script src="./dist/src/index.js" type="module"></script>
  </body>
</html>
